name: test publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - test-*   # only tags starting with 'test-'

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Show event info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref }}"
          echo "Ref name: ${{ github.ref_name }}"
          echo "Tag from ref (strip prefix): ${GITHUB_REF#refs/tags/}"

      - name: Simulate build wheel
        run: |
          echo "Simulating building wheel..."
          mkdir -p dist
          echo "fake wheel content" > dist/example-0.0.0-py3-none-any.whl

      - name: Upload Python package dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-dist
          path: dist

  pypi-publish:
    name: Simulate upload to PyPI
    runs-on: ubuntu-latest
    needs: build-wheel
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Python package dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-dist
          path: dist

      - name: List downloaded artifacts
        run: ls -R

      - name: Simulate publish
        run: |
          echo "Simulating publish to PyPI for tag ${{ github.ref_name }}"