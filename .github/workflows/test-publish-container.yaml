name: test build and push image

on:
  workflow_run:
    workflows: ["test publish to PyPI"] 
    types:
      - completed

jobs:
  build-and-push-image:
    # Only run if the upstream workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Show workflow_run payload info
        run: |
          echo "Workflow run ID: ${{ github.event.workflow_run.id }}"
          echo "Workflow name:  ${{ github.event.workflow_run.name }}"
          echo "Head branch:    ${{ github.event.workflow_run.head_branch }}"
          echo "Head SHA:       ${{ github.event.workflow_run.head_sha }}"

      - name: Derive TAG and TAG_NO_V from workflow_run.head_branch
        run: |
          TAG='${{ github.event.workflow_run.head_branch }}'
          TAG_NO_V="${TAG#v}"
          echo "TAG=$TAG"
          echo "TAG_NO_V=$TAG_NO_V"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "TAG_NO_V=$TAG_NO_V" >> $GITHUB_ENV

      - name: Simulate docker metadata usage
        run: |
          echo "Simulating docker metadata with tags:"
          echo " - latest"
          echo " - $TAG"
          echo " - $TAG_NO_V"

      - name: Simulate docker build and push
        run: |
          echo "Simulating docker build for tag: $TAG"
          echo "Simulating push to ghcr.io/your-org/your-image:$TAG"