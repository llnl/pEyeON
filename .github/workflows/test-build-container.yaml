name: Container Build Test
on: 
  pull_request:
    branches:
      - main  
  push:
    paths:
      - .dockerignore
      - builds/Dockerfile
      - builds/podman.Dockerfile

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            tag: amd64
          - platform: linux/arm64
            tag: arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        run: |
            docker buildx build -f builds/Dockerfile --platform ${{ matrix.platform }} --load -t peyeon:${{ matrix.tag }} .
    
      - name: Run Test Command
        run: |
            docker run --rm --platform ${{ matrix.platform }} peyeon:${{ matrix.tag }} sh -c "eyeon --help"

  podman-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build Podman Image
        run: |
            podman build -f builds/podman.Dockerfile -t peyeon:podman .
    
      - name: Run Test Command
        run: |
            podman run --rm peyeon:podman sh -c "eyeon --help"
